version: 1
updated: 2026-06-15
roadmap:
  - id: full-tab-review-workspace
    horizon: now
    status: active
    summary: Durable Chrome tab now owns generation, review output, title, operation buttons, feedback iteration, keyword/topic gaps, and follow-up question workflows.
  - id: stabilize-local-extension
    horizon: now
    status: active
    summary: Keep the Chrome extension reliable for local Amazon review drafting with Ollama.
  - id: review-history
    horizon: next
    status: planned
    summary: Add local review history so generated reviews and iterations can be recovered, reviewed, and deleted.
  - id: improve-generation-quality
    horizon: next
    status: planned
    summary: Strengthen prompt handling, JSON recovery, guidance editing, and result validation without inventing reviewer experiences.
  - id: provider-abstraction
    horizon: later
    status: planned
    summary: Introduce a provider boundary for hosted or pluggable model providers after the MVP remains stable on Ollama.
  - id: browser-and-release-readiness
    horizon: later
    status: scoped
    summary: Chrome-only and unpacked-folder distribution are accepted for MVP; revisit broader browser and packaging support later.
