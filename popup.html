<!DOCTYPE html>
<html>
<head>
  <title>Review Author</title>
  <link rel="stylesheet" type="text/css" href="styles.css">
</head>
<body>
  <div class="container">
    <h1>Review Author</h1>
    <div class="form-group">
      <label for="ollama-model">Ollama Model:</label>
      <select id="ollama-model">
        <!-- Models will be populated dynamically -->
      </select>
    </div>
    <div class="form-group">
      <label for="reviewer-comments">Reviewer Comments:</label>
      <textarea id="reviewer-comments" rows="4"></textarea>
    </div>
    <button id="create-review">Create Review</button>
    <div class="form-group">
      <label for="suggested-stars">Suggested Stars:</label>
      <input id="suggested-stars" type="text" readonly>
    </div>
    <div class="form-group">
      <label for="generated-review">Generated Review:</label>
      <textarea id="generated-review" rows="10" readonly></textarea>
    </div>
    <div class="form-group">
      <label for="review-title">Title:</label>
      <input id="review-title" type="text" readonly>
    </div>
    <div class="form-group feedback-group">
      <label for="feedback">Feedback on Quality:</label>
      <textarea id="feedback" rows="2"></textarea>
      <button id="update-guidance">Update Guidance & Regenerate</button>
    </div>
    <div class="form-group">
      <label for="guidance">Guidance (JSON):</label>
      <textarea id="guidance" rows="5"></textarea>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
